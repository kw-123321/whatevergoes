<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker - Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">Fitness Tracker</div>
    <nav class="nav-bar">
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Login</h1>
      <form action="/login" method="POST" class="auth-form">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
        <br>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required />
        <br>

        <button type="submit" class="button">Sign in</button>
      </form>

      <p class="auth-footer">
        New here? <a href="signup.html">Create an account</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Fitness Tracker login page.</p>
  </footer>
  <script>
    document.querySelector(".auth-form").addEventListener("submit", (event) => {
      if (window.location.protocol === "file:") {
        event.preventDefault();
        alert("Please run the app with npm start, then open http://localhost:3000/login.html");
      }
    });
  </script>
</body>
</html>
